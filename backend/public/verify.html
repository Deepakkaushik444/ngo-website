<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .verification-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 650px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }
        .valid {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .invalid {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .details {
            background: #f9f9f9;
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            margin-top: 15px;
        }
        .details p {
            margin: 12px 0;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px;
        }
        .details strong {
            display: inline-block;
            width: 140px;
            color: #333;
        }
        h2 {
            color: #1e3c72;
            margin-bottom: 10px;
        }
        /* Improved loader: spinner + static text */
        .loader-container {
            text-align: center;
            margin: 20px auto;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        .loader-text {
            font-size: 14px;
            color: #555;
            margin-top: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
        
        @media (max-width: 600px) {
            .details strong {
                display: block;
                width: auto;
                margin-bottom: 4px;
            }
            .verification-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="verification-card" id="app">
    <h2>🔍 Official Certificate Verification</h2>
    <div id="content">
        <div class="loader-container">
            <div class="spinner"></div>
            <div class="loader-text">Loading certificate details...</div>
        </div>
    </div>
</div>
<script>
    const certId = window.location.pathname.split('/').pop();
    const contentDiv = document.getElementById('content');

    if (!certId || certId === 'verify.html') {
        contentDiv.innerHTML = `<div class="invalid">❌ Invalid verification link. No certificate ID provided.</div>`;
    } else {
        // Use absolute backend URL – adjust if your backend is on Render
        const API_BASE = 'https://ngo-website-wzab.onrender.com'; // <-- CHANGE to your actual backend URL
        fetch(`${API_BASE}/api/certificates/verify/${certId}`)
            .then(res => res.json())
            .then(data => {
                if (data.valid) {
                    const cert = data.data;
                    const issueDate = new Date(cert.issueDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                    const expiry = cert.expiryDate ? new Date(cert.expiryDate).toLocaleDateString() : 'No expiry';
                    contentDiv.innerHTML = `
                        <div class="valid">✅ This is an OFFICIAL and VALID certificate issued by ${cert.ngoName || 'the organization'}.</div>
                        <div class="details">
                            <p><strong>Recipient:</strong> ${cert.recipientName}</p>
                            <p><strong>Certificate Type:</strong> ${cert.certificateType}</p>
                            <p><strong>Description:</strong> ${cert.description || '—'}</p>
                            <p><strong>Issue Date:</strong> ${issueDate}</p>
                            <p><strong>Expiry Date:</strong> ${expiry}</p>
                            <p><strong>Certificate Serial No:</strong> ${cert.certificateNumber}</p>
                            <p><strong>Verification ID:</strong> ${cert.certId}</p>
                            <p><strong>Signed by:</strong> ${cert.signatureName} (${cert.signatureTitle})</p>
                        </div>
                        <div class="footer">This is an instant, tamper-proof verification from the official database.</div>
                    `;
                } else {
                    contentDiv.innerHTML = `<div class="invalid">❌ ${data.message || 'Certificate not found. This is NOT a genuine certificate.'}</div>`;
                }
            })
            .catch(err => {
                contentDiv.innerHTML = `<div class="invalid">⚠️ Verification service error: ${err.message}</div>`;
            });
    }
</script>
</body>
</html>
